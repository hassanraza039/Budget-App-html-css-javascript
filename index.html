<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget App</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <script defer src="./app.js"></script>
</head>
<body>
    <div class="container">
    <div class="budget_app">
    <div class="budget_container">
        <label for="" class="budget">Budget</label>
        <input type="text" class="input_budget" id="budget_total" placeholder="Enter Total Amount">
        <button class="set_budget" onclick="totalAmount();">Set Button</button>
    </div>
    <div class="Expense_container">
        <label for="" class="expense">Expenses</label>
        <input type="text" class="input_expense1" id="expense_text" placeholder="Enter Expense">
        <input type="number" class="input_expense2" id="expense_number" placeholder="Enter Expense Amount">
        <button class="set_expense" onclick="setExpense();">Check amount</button>
    </div>
    </div>
    </div>
    <br>
    <div class="balance_container">
        <div>
            <p>Total Budget</p>
            <span id="amount_budget">0</span>
        </div>
        <div>
            <p>Expense </p>
            <span id="amount_expense">0</span>
        </div>
        <div>
            <p>Balance</p>
            <span id="amount_balance">0</span>
        </div>
    </div>
    <br>
    <div class="expense_list" id="expense_list">
    <h3>Expense List</h3>
</div>
</div>
</body>
</html>
